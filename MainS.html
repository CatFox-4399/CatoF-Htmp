        <script>
             let currentImageIndex = 0;
        const images = document.querySelectorAll('.image');
        const firm=[
            "media/F150.mp4",
            "media/Mustang.mp4",
            "media/GT.mp4",
            "media/Focus ST.mp4",
            "media/SuperDuty.mp4",
            "media/Bronco.mp4"
        ]
        
        function swapImageNext(currentImageIndex, index,indexback){
            
            images[currentImageIndex].style.display = 'none';
            if(currentImageIndex >=0){
                document.getElementById("prevbtn").removeAttribute("disabled");
            }
            if (indexback >= images.length-1){
                document.getElementById("nextbtn").disabled = true;
            }

            images[indexback].style.display = 'block';
            images[indexback].animate([
                // keyframes
                { transform: 'translateX(100%)', opacity: 0 },
                { transform: 'translateX(0)', opacity: 1 }
              ], {
                // timing options
                duration: 500,
                easing: 'ease-out',
              });
            currentImageIndex = index;
            return currentImageIndex;
        }

        function swapImagePrev(currentImageIndex, index,indexback){
            
            currentImageIndex--;
            images[indexback].style.display = 'none';
            if(currentImageIndex <= images.length-1){
                document.getElementById("nextbtn").removeAttribute("disabled");
            }
            if (currentImageIndex <= 0){
                document.getElementById("prevbtn").disabled = true;
            }

            images[currentImageIndex].style.display = 'block';
            images[currentImageIndex].animate([
                // keyframes
                { transform: 'translateX(-100%)', opacity: 0 },
                { transform: 'translateX(0)', opacity: 1 }
              ], {
                // timing options
                duration: 500,
                easing: 'ease-out',
              });

            currentImageIndex = index;
            return currentImageIndex;
        }
                function playAudio(){
            const audio = document.getElementById("background-audio");
            audio.play();
        }

        const buttons_swapMusic = document.querySelectorAll('.option-music button');
        buttons_swapMusic.forEach(button => {
            button.addEventListener('click', () => {

                buttons_swapMusic.forEach(btn => btn.removeAttribute('active'));
                button.setAttribute('active', '');
                const audio = document.getElementById("background-audio");
                const video = document.querySelector('.animation-container video');
                
                video.src=firm[button.value];
                audio.src = `music/audio${button.value}.mp3`;
                audio.play();

            });
        });
        </script>
